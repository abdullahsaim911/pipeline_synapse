[pytest]
# Pytest configuration for Synapse project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    unit: Unit tests for individual modules
    integration: Integration tests for complete pipeline
    performance: Performance and optimization tests
    slow: Tests that take longer to run
    requires_gpu: Tests that require CUDA GPU
    requires_ollama: Tests that require Ollama service
    requires_video: Tests that require actual video files

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */env/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
